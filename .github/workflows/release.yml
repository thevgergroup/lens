name: Release

on:
  push:
    tags:
      - 'v*'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
      - run: npm ci
      - run: npm run test:unit

  build:
    name: Package Chrome/Firefox
    needs: test
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
      - run: npm ci

      - name: Extract version from manifest
        id: version
        run: echo "version=$(node -p "require('./manifest.json').version")" >> "$GITHUB_OUTPUT"

      - name: Verify tag matches manifest version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          MANIFEST="${{ steps.version.outputs.version }}"
          if [ "$TAG" != "$MANIFEST" ]; then
            echo "Tag $TAG does not match manifest version $MANIFEST"
            exit 1
          fi

      - name: Build Chrome/Edge zip
        run: npm run package

      - name: Sign Firefox XPI
        env:
          MOZILLA_JWT_ISSUER: ${{ secrets.MOZILLA_JWT_ISSUER }}
          MOZILLA_JWT_SECRET: ${{ secrets.MOZILLA_JWT_SECRET }}
        run: |
          npm run sign:firefox && \
            XPI=$(find dist -name '*.xpi' | head -1) && \
            mv "$XPI" "dist/lens-${{ steps.version.outputs.version }}.xpi" || \
            echo "::warning::Firefox signing failed (version may already exist on AMO). Skipping XPI."

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: lens-${{ steps.version.outputs.version }}
          path: dist/
          retention-days: 30
          if-no-files-found: warn

  build-safari:
    name: Build Safari (macOS)
    needs: test
    runs-on: macos-15
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Extract version from manifest
        id: version
        run: echo "version=$(node -p "require('./manifest.json').version")" >> "$GITHUB_OUTPUT"

      - name: Import Developer ID certificate
        env:
          CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/lens-signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -hex 16)
          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> $GITHUB_ENV

          # Create temporary keychain
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Import certificate
          echo "$CERTIFICATE_BASE64" | base64 --decode > /tmp/lens-cert.p12
          security import /tmp/lens-cert.p12 -k "$KEYCHAIN_PATH" \
            -P "$CERTIFICATE_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple: -s \
            -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH" login.keychain
          rm /tmp/lens-cert.p12

      - name: Install App Store Connect API key
        env:
          API_KEY_BASE64: ${{ secrets.APPLE_API_KEY_BASE64 }}
          API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          echo "$API_KEY_BASE64" | base64 --decode \
            > ~/.appstoreconnect/private_keys/AuthKey_${API_KEY_ID}.p8

      - name: Build Safari extension archive
        env:
          TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          xcodebuild -project safari-ext/Lens/Lens.xcodeproj \
            -scheme "Lens" \
            -configuration Release \
            -archivePath $RUNNER_TEMP/Lens.xcarchive \
            DEVELOPMENT_TEAM="$TEAM_ID" \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Developer ID Application" \
            archive

      - name: Export and notarize
        env:
          TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          # Export the archive as a Developer ID app
          cat > /tmp/export-options.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>developer-id</string>
            <key>teamID</key>
            <string>${TEAM_ID}</string>
            <key>signingStyle</key>
            <string>automatic</string>
          </dict>
          </plist>
          EOF

          xcodebuild -exportArchive \
            -archivePath $RUNNER_TEMP/Lens.xcarchive \
            -exportOptionsPlist /tmp/export-options.plist \
            -exportPath $RUNNER_TEMP/export \
            -allowProvisioningUpdates \
            -authenticationKeyPath ~/.appstoreconnect/private_keys/AuthKey_${API_KEY_ID}.p8 \
            -authenticationKeyID "$API_KEY_ID" \
            -authenticationKeyIssuerID "$API_ISSUER_ID"

          # Zip for notarization
          ditto -c -k --keepParent \
            "$RUNNER_TEMP/export/Lens.app" \
            "$RUNNER_TEMP/Lens-notarize.zip"

          # Notarize — submit and capture submission ID in case polling times out
          SUBMIT_OUTPUT=$(xcrun notarytool submit "$RUNNER_TEMP/Lens-notarize.zip" \
            --key ~/.appstoreconnect/private_keys/AuthKey_${API_KEY_ID}.p8 \
            --key-id "$API_KEY_ID" \
            --issuer "$API_ISSUER_ID" \
            --wait \
            --timeout 20m 2>&1) || true
          echo "$SUBMIT_OUTPUT"

          # If --wait timed out, poll until accepted (max 10 more minutes)
          if echo "$SUBMIT_OUTPUT" | grep -q "id:"; then
            SUBMISSION_ID=$(echo "$SUBMIT_OUTPUT" | grep "id:" | head -1 | awk '{print $2}')
            echo "Submission ID: $SUBMISSION_ID"
            for i in $(seq 1 10); do
              STATUS=$(xcrun notarytool info "$SUBMISSION_ID" \
                --key ~/.appstoreconnect/private_keys/AuthKey_${API_KEY_ID}.p8 \
                --key-id "$API_KEY_ID" \
                --issuer "$API_ISSUER_ID" 2>&1 | grep "status:" | awk '{print $2}')
              echo "Poll $i: status=$STATUS"
              if [ "$STATUS" = "Accepted" ]; then break; fi
              if [ "$STATUS" = "Invalid" ]; then echo "Notarization rejected"; exit 1; fi
              sleep 60
            done
          fi

          # Staple the notarization ticket
          xcrun stapler staple "$RUNNER_TEMP/export/Lens.app"

          # Package as DMG for distribution
          mkdir -p dist
          hdiutil create -volname "Lens $VERSION" \
            -srcfolder "$RUNNER_TEMP/export/Lens.app" \
            -ov -format UDZO \
            "dist/lens-${VERSION}-mac.dmg"

      - name: Clean up keychain
        if: always()
        run: security delete-keychain "$KEYCHAIN_PATH" 2>/dev/null || true

      - name: Upload Safari artifact
        uses: actions/upload-artifact@v4
        with:
          name: lens-safari-${{ steps.version.outputs.version }}
          path: dist/lens-${{ steps.version.outputs.version }}-mac.dmg
          retention-days: 30

  publish-chrome:
    name: Publish to Chrome Web Store
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download Chrome artifact
        uses: actions/download-artifact@v4
        with:
          name: lens-${{ needs.build.outputs.version }}
          path: dist/

      - name: Publish to Chrome Web Store
        env:
          CWS_CLIENT_EMAIL: ${{ secrets.CWS_CLIENT_EMAIL }}
          CWS_PRIVATE_KEY: ${{ secrets.CWS_PRIVATE_KEY }}
          CWS_EXTENSION_ID: ${{ secrets.CWS_EXTENSION_ID }}
          VERSION: ${{ needs.build.outputs.version }}
        run: |
          pip install cryptography --quiet

          python3 << 'PYEOF'
          import os, time, json, base64, urllib.request, urllib.parse
          from cryptography.hazmat.primitives.serialization import load_pem_private_key
          from cryptography.hazmat.primitives.asymmetric import padding
          from cryptography.hazmat.primitives import hashes

          client_email = os.environ['CWS_CLIENT_EMAIL']
          private_key_pem = os.environ['CWS_PRIVATE_KEY'].replace('\\n', '\n').encode()
          extension_id = os.environ['CWS_EXTENSION_ID']

          # Build JWT
          now = int(time.time())
          header = base64.urlsafe_b64encode(json.dumps({"alg":"RS256","typ":"JWT"}).encode()).rstrip(b'=')
          payload = base64.urlsafe_b64encode(json.dumps({
            "iss": client_email,
            "scope": "https://www.googleapis.com/auth/chromewebstore",
            "aud": "https://oauth2.googleapis.com/token",
            "iat": now, "exp": now + 3600
          }).encode()).rstrip(b'=')
          msg = header + b'.' + payload
          key = load_pem_private_key(private_key_pem, password=None)
          sig = base64.urlsafe_b64encode(key.sign(msg, padding.PKCS1v15(), hashes.SHA256())).rstrip(b'=')
          jwt = (msg + b'.' + sig).decode()

          # Exchange for access token
          resp = urllib.request.urlopen(urllib.request.Request(
            'https://oauth2.googleapis.com/token',
            data=urllib.parse.urlencode({'grant_type':'urn:ietf:params:oauth:grant-type:jwt-bearer','assertion':jwt}).encode(),
            headers={'Content-Type':'application/x-www-form-urlencoded'}
          ))
          token = json.loads(resp.read())['access_token']

          version = os.environ['VERSION']
          zip_path = f"dist/lens-{version}.zip"

          # Upload
          with open(zip_path, 'rb') as f:
            upload_req = urllib.request.Request(
              f'https://www.googleapis.com/upload/chromewebstore/v1.1/items/{extension_id}',
              data=f.read(), method='PUT',
              headers={'Authorization': f'Bearer {token}', 'x-goog-api-version': '2'}
            )
          upload_resp = json.loads(urllib.request.urlopen(upload_req).read())
          print('Upload:', upload_resp.get('uploadState'))
          assert upload_resp.get('uploadState') == 'SUCCESS', f"Upload failed: {upload_resp}"

          # Publish
          pub_req = urllib.request.Request(
            f'https://www.googleapis.com/chromewebstore/v1.1/items/{extension_id}/publish',
            data=b'{}', method='POST',
            headers={'Authorization': f'Bearer {token}', 'x-goog-api-version': '2', 'Content-Type': 'application/json'}
          )
          pub_resp = json.loads(urllib.request.urlopen(pub_req).read())
          print('Publish:', pub_resp.get('status'))
          assert pub_resp.get('status')[0] in ('OK', 'ITEM_PENDING_REVIEW'), f"Publish failed: {pub_resp}"
          PYEOF

  release:
    name: Create GitHub release
    needs: [build, build-safari, publish-chrome]
    if: always() && needs.build.result == 'success' && needs.publish-chrome.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download Chrome/Firefox artifacts
        uses: actions/download-artifact@v4
        with:
          name: lens-${{ needs.build.outputs.version }}
          path: dist/

      - name: Download Safari artifact
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: lens-safari-${{ needs.build.outputs.version }}
          path: dist/

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: Lens v${{ needs.build.outputs.version }}
          body: |
            ## Install

            ### Firefox
            Download **lens-${{ needs.build.outputs.version }}.xpi** below and open it in Firefox. You'll be prompted to install.

            ### Chrome, Edge, Brave
            Download **lens-${{ needs.build.outputs.version }}.zip**, unzip it, then load via `chrome://extensions/` → Developer mode → Load unpacked.

            ### Safari (macOS)
            Download **lens-${{ needs.build.outputs.version }}-mac.dmg**, open it, drag Lens to Applications, then enable it in Safari → Settings → Extensions.

            ---
            See [WHITEPAPER.md](https://github.com/thevgergroup/lens/blob/main/WHITEPAPER.md) for technical details.
          files: |
            dist/lens-${{ needs.build.outputs.version }}.zip
            dist/lens-${{ needs.build.outputs.version }}.xpi
            dist/lens-${{ needs.build.outputs.version }}-mac.dmg
          fail_on_unmatched_files: false
