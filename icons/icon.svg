<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <!-- Dark background -->
  <rect width="128" height="128" rx="28" fill="#0A0C10"/>

  <!-- Outer lens ring -->
  <circle cx="64" cy="64" r="42" fill="none" stroke="#63B3ED" stroke-width="6"/>

  <!-- Inner iris -->
  <circle cx="64" cy="64" r="22" fill="none" stroke="#63B3ED" stroke-width="4.5"/>

  <!-- Pupil dot -->
  <circle cx="64" cy="64" r="7" fill="#63B3ED"/>

  <!-- Crosshair lines - top -->
  <line x1="64" y1="16" x2="64" y2="36" stroke="#63B3ED" stroke-width="4" stroke-linecap="round"/>
  <!-- Crosshair lines - bottom -->
  <line x1="64" y1="92" x2="64" y2="112" stroke="#63B3ED" stroke-width="4" stroke-linecap="round"/>
  <!-- Crosshair lines - left -->
  <line x1="16" y1="64" x2="36" y2="64" stroke="#63B3ED" stroke-width="4" stroke-linecap="round"/>
  <!-- Crosshair lines - right -->
  <line x1="92" y1="64" x2="112" y2="64" stroke="#63B3ED" stroke-width="4" stroke-linecap="round"/>
</svg>
